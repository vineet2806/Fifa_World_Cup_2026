name: Daily Dashboard Refresh

on:
  push:
    branches: [main]
  schedule:
    # Every 15 minutes. GitHub free-tier scheduled workflows are best-effort
    # and routinely skip sub-15-min crons during peak load — 15 min is the
    # smallest interval the scheduler honors reliably.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Force bypass cache and re-fetch all data"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

concurrency:
  group: wc2026-dashboard-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Fetch Data · Build Dashboard · Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install dependencies (Python 3 pre-installed on ubuntu-latest) ──
      - name: Install Python dependencies
        run: |
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install requests beautifulsoup4

      # ── 3. Restore Groq narrative cache (persists LLM output across runs) ──
      # Free data sources refresh every 5 min; AI narratives are reused for ~30 min
      # so we stay well under the Groq free-tier rate limit.
      # Key rotates every 30 min — each new bucket writes a fresh cache entry,
      # intermediate runs restore the most recent prior bucket via restore-keys.
      - name: Compute 30-min cache bucket
        id: bucket
        run: |
          # Floor current UTC time to nearest 30-min window: YYYYMMDDHHM (M = 0 or 3)
          BUCKET=$(date -u +'%Y%m%d%H')$(( $(date -u +'%M') / 30 * 3 ))
          echo "value=${BUCKET}" >> "$GITHUB_OUTPUT"
          echo "30-min bucket key: ${BUCKET}"

      - name: Restore Groq narrative cache
        uses: actions/cache@v4
        with:
          path: data/cache/groq_narratives.json
          key: groq-narratives-${{ steps.bucket.outputs.value }}
          restore-keys: |
            groq-narratives-

      # ── 4. Clear cache if force refresh ───────────────────────────────────
      - name: Clear data cache (force refresh)
        if: ${{ github.event.inputs.force_refresh == 'true' }}
        run: rm -rf data/cache/*.json && echo "Cache cleared"

      # ── 5. Run dashboard generator ─────────────────────────────────────────
      - name: Generate dashboard
        run: python3 src/generate_dashboard.py
        env:
          PYTHONUNBUFFERED: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # ── 6. Validate output ─────────────────────────────────────────────────
      - name: Validate output file
        run: |
          if [ ! -f public/index.html ]; then
            echo "❌ ERROR: public/index.html not found!"
            exit 1
          fi
          SIZE=$(wc -c < public/index.html)
          echo "✅ public/index.html exists (${SIZE} bytes)"
          if [ "$SIZE" -lt 50000 ]; then
            echo "⚠️ WARNING: File seems too small (${SIZE} bytes). Possible generation failure."
          fi
          # Check no external script tags (self-contained check)
          if grep -qP '<script\s+src="https?://' public/index.html; then
            echo "⚠️ WARNING: External script tag detected — dashboard may not be self-contained"
          else
            echo "✅ No external script dependencies detected"
          fi

      # ── 7. Upload artifact ─────────────────────────────────────────────────
      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: wc2026-dashboard-${{ github.run_number }}
          path: public/index.html
          retention-days: 7

      # ── 8. Deploy to Azure Static Web Apps ────────────────────────────────
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "public"
          output_location: ""
          skip_api_build: true

      # ── 9. Build log ───────────────────────────────────────────────────────
      - name: Print build log
        if: always()
        run: |
          echo "=== Build Log ==="
          cat data/build.log 2>/dev/null || echo "(no build log)"
