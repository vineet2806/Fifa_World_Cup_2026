name: Daily Dashboard Refresh

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Force bypass cache and re-fetch all data"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Fetch Data · Build Dashboard · Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4

      # ── 4. Clear cache if force refresh ───────────────────────────────────
      - name: Clear data cache (force refresh)
        if: ${{ github.event.inputs.force_refresh == 'true' }}
        run: rm -rf data/cache/*.json && echo "Cache cleared"

      # ── 5. Run dashboard generator ─────────────────────────────────────────
      - name: Generate dashboard
        run: python src/generate_dashboard.py
        env:
          PYTHONUNBUFFERED: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # ── 6. Validate output ─────────────────────────────────────────────────
      - name: Validate output file
        run: |
          if [ ! -f public/index.html ]; then
            echo "❌ ERROR: public/index.html not found!"
            exit 1
          fi
          SIZE=$(wc -c < public/index.html)
          echo "✅ public/index.html exists (${SIZE} bytes)"
          if [ "$SIZE" -lt 50000 ]; then
            echo "⚠️ WARNING: File seems too small (${SIZE} bytes). Possible generation failure."
          fi
          # Check no external script tags (self-contained check)
          if grep -qP '<script\s+src="https?://' public/index.html; then
            echo "⚠️ WARNING: External script tag detected — dashboard may not be self-contained"
          else
            echo "✅ No external script dependencies detected"
          fi

      # ── 7. Upload artifact ─────────────────────────────────────────────────
      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: wc2026-dashboard-${{ github.run_number }}
          path: public/index.html
          retention-days: 7

      # ── 8. Deploy to Azure Static Web Apps ────────────────────────────────
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "public"
          output_location: ""
          skip_api_build: true

      # ── 9. Build log ───────────────────────────────────────────────────────
      - name: Print build log
        if: always()
        run: |
          echo "=== Build Log ==="
          cat data/build.log 2>/dev/null || echo "(no build log)"
